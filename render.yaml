# Render Blueprint — deploys the API (web service) + storefront & admin (static sites).
#
# You only need to supply the 4 secrets marked `sync: false` (MONGODB_URI and the
# three Cloudinary values). Everything else is wired automatically:
#   • JWT_SECRET is generated by Render.
#   • The storefront and admin receive the API's live URL via `fromService`, so
#     there are no URLs to copy/paste and no second pass.
#   • CORS accepts *.onrender.com out of the box (see server/app.js), so the API
#     needs no CLIENT_URL/ADMIN_URL unless you add a custom domain.
services:
  - type: web
    name: eniola-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node app.js
    healthCheckPath: /health
    envVars:
      # Atlas connection string — the mongodb+srv:// form works on Render.
      - key: MONGODB_URI
        sync: false
      # Cloudinary — keeps uploaded media off Render's ephemeral disk.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 7d

  - type: web
    name: eniola-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Resolves to the API's live https URL at build time — nothing to type.
      - key: VITE_API_URL
        fromService:
          type: web
          name: eniola-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: eniola-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: eniola-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
